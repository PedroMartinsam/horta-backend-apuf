# ===========================
# APUF Backend – application.properties
# ===========================

spring.application.name=apuf-backend

# ---- Server ----
server.port=${PORT:8080}
server.error.include-message=always

# ---- Datasource (PostgreSQL - Render) ----
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# ---- Cloudinary ----
cloudinary.cloud-name=${CLOUD_NAME}
cloudinary.api-key=${CLOUD_KEY}
cloudinary.api-secret=${CLOUD_SECRET}

# ---- CORS ----
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://apuf-feira.vercel.app}

# ---- Logging ----
logging.level.com.apuf=INFO
logging.level.org.springframework.security=WARN
