# ===========================
# APUF Backend – application.properties
# ===========================

spring.application.name=apuf-backend

# ---- Datasource (PostgreSQL) ----
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/apuf}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:4215}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- JPA / Hibernate ----
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ---- JWT ----
jwt.secret=${JWT_SECRET:apuf-super-secret-key-2025-fernandopolis-sp-change-in-production}
jwt.expiration=86400000

